services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-education_demand}
      POSTGRES_USER: ${POSTGRES_USER:-education_demand}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-education_demand}:${POSTGRES_PASSWORD:-change_me}@postgres:5432/${POSTGRES_DB:-education_demand}
    ports:
      - "${APP_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command: ["python", "-m", "apps.worker"]
    environment:
      APP_ENV: ${APP_ENV:-development}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-education_demand}:${POSTGRES_PASSWORD:-change_me}@postgres:5432/${POSTGRES_DB:-education_demand}
      WORKER_ID: ${WORKER_ID:-worker-1}
      WORKER_POLL_INTERVAL_SECONDS: ${WORKER_POLL_INTERVAL_SECONDS:-5}
      WORKER_TASK_TIMEOUT_MINUTES: ${WORKER_TASK_TIMEOUT_MINUTES:-20}
      WORKER_SNAPSHOT_ROOT: ${WORKER_SNAPSHOT_ROOT:-.runtime/storage-snapshots}
      WORKER_ADAPTER: ${WORKER_ADAPTER:-mediacrawler}
      MEDIACRAWLER_ENABLE_CDP_MODE: ${MEDIACRAWLER_ENABLE_CDP_MODE:-true}
      MEDIACRAWLER_CDP_CONNECT_EXISTING: ${MEDIACRAWLER_CDP_CONNECT_EXISTING:-false}
      MEDIACRAWLER_CDP_DEBUG_PORT: ${MEDIACRAWLER_CDP_DEBUG_PORT:-9222}
      MEDIACRAWLER_AUTO_CLOSE_BROWSER: ${MEDIACRAWLER_AUTO_CLOSE_BROWSER:-false}
      MEDIACRAWLER_SAVE_LOGIN_STATE: ${MEDIACRAWLER_SAVE_LOGIN_STATE:-true}
      MEDIACRAWLER_USER_DATA_DIR: ${MEDIACRAWLER_USER_DATA_DIR:-aixhs_%s_user_data_dir}
      MEDIACRAWLER_CUSTOM_BROWSER_PATH: ${MEDIACRAWLER_CUSTOM_BROWSER_PATH:-}
      MEDIACRAWLER_COOKIES: ${MEDIACRAWLER_COOKIES:-}
      XHS_BROWSER_PROFILE_DIR: ${XHS_BROWSER_PROFILE_DIR:-.runtime/xhs-profile}
      XHS_HEADLESS: ${XHS_HEADLESS:-true}
      XHS_SNAPSHOT_DIR: ${XHS_SNAPSHOT_DIR:-.runtime/snapshots}
      XHS_SCREENSHOT_DIR: ${XHS_SCREENSHOT_DIR:-.runtime/screenshots}
      XHS_PAGE_TIMEOUT_MS: ${XHS_PAGE_TIMEOUT_MS:-30000}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - worker_runtime:/app/.runtime

volumes:
  postgres_data:
  worker_runtime:
