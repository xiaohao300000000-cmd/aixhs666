<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AIXHS Ops</title>
    <link rel="stylesheet" href="/ops/static/ops.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>AIXHS Ops</h1>
      <div class="token">
        <input id="ops-token" type="password" placeholder="OPS_TOKEN" autocomplete="off" />
        <label><input id="auto-refresh" type="checkbox" checked /> Auto</label>
        <button id="refresh-all" type="button">Refresh</button>
      </div>
    </header>
    <main>
      <section>
        <h2>System</h2>
        <div id="system" class="grid"></div>
        <div id="dashboard" class="grid"></div>
      </section>
      <section>
        <h2>Workers</h2>
        <table>
          <thead><tr><th>ID</th><th>Online</th><th>Status</th><th>Task</th><th>Started</th><th>Heartbeat</th><th>Done</th><th>Failed</th><th>Error</th></tr></thead>
          <tbody id="workers"></tbody>
        </table>
        <div class="actions">
          <button data-post="/ops/api/worker/pause" data-confirm="Pause workers?">Pause</button>
          <button data-post="/ops/api/worker/resume">Resume</button>
          <button data-post="/ops/api/worker/recover-timeouts">Recover timeouts</button>
        </div>
      </section>
      <section>
        <h2>Tasks</h2>
        <div class="filters">
          <select id="task-status"><option value="">All status</option><option>pending</option><option>running</option><option>partial</option><option>retry</option><option>completed</option><option>failed</option><option>cancelled</option></select>
          <select id="task-type"><option value="">All types</option><option>search</option><option>comments</option><option>profile</option><option>content_detail</option></select>
          <input id="task-q" placeholder="Search keyword" />
          <button id="task-filter">Apply</button>
        </div>
        <form id="create-task" class="inline-form">
          <input name="query_text" placeholder="Query text" required />
          <input name="limit" type="number" min="1" max="200" value="20" />
          <input name="priority" type="number" value="100" />
          <button>Create search task</button>
        </form>
        <table>
          <thead><tr><th>ID</th><th>Type</th><th>Query</th><th>Target</th><th>Status</th><th>Priority</th><th>Attempts</th><th>Worker</th><th>Started</th><th>Finished</th><th>Error</th><th>Actions</th></tr></thead>
          <tbody id="tasks"></tbody>
        </table>
      </section>
      <section>
        <h2>Queries</h2>
        <form id="create-query" class="inline-form">
          <input name="query_text" placeholder="New query" required />
          <input name="priority" type="number" value="100" />
          <button>Add query</button>
        </form>
        <table>
          <thead><tr><th>ID</th><th>Query</th><th>Status</th><th>Priority</th><th>Output</th><th>Last run</th><th>Success</th><th>Failure</th><th>Actions</th></tr></thead>
          <tbody id="queries"></tbody>
        </table>
      </section>
      <section>
        <h2>Recent Results</h2>
        <div class="columns">
          <div><h3>Posts</h3><div id="contents"></div></div>
          <div><h3>Comments</h3><div id="comments"></div></div>
          <div><h3>Users</h3><div id="profiles"></div></div>
        </div>
      </section>
      <section>
        <h2>Errors And Artifacts</h2>
        <div id="errors"></div>
      </section>
      <section>
        <h2>Browser</h2>
        <div id="browser" class="grid"></div>
        <div class="actions">
          <button data-post="/ops/api/browser/check-login">Check login</button>
          <button data-post="/ops/api/browser/open-login" data-confirm="Open manual login guidance?">Open login</button>
        </div>
      </section>
    </main>
    <script src="/ops/static/ops.js"></script>
  </body>
</html>
