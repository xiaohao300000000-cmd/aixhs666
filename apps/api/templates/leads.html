<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>客户判断工作台</title>
    <link rel="stylesheet" href="/leads/static/leads.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>客户判断工作台</h1>
        <p>按新鲜度、意向和可行动性处理小红书 KET/PET 线索</p>
      </div>
      <button id="backfill-button" type="button">从历史数据生成客户</button>
    </header>

    <main>
      <section class="summary" aria-label="获客统计">
        <div>
          <span id="today-new">0</span>
          <label>今日新发现</label>
        </div>
        <div>
          <span id="priority-immediate">0</span>
          <label>立即处理</label>
        </div>
        <div>
          <span id="priority-today">0</span>
          <label>今日内处理</label>
        </div>
        <div>
          <span id="information-insufficient">0</span>
          <label>信息不足</label>
        </div>
      </section>

      <section class="board" aria-label="潜在客户列表">
        <div class="lane" data-bucket="立即处理">
          <h2>立即处理</h2>
          <div id="lane-immediate" class="lead-list"></div>
        </div>
        <div class="lane" data-bucket="今日内处理">
          <h2>今日内处理</h2>
          <div id="lane-today" class="lead-list"></div>
        </div>
        <div class="lane" data-bucket="可观察">
          <h2>可观察</h2>
          <div id="lane-observe" class="lead-list"></div>
        </div>
        <div class="lane" data-bucket="信息不足">
          <h2>信息不足</h2>
          <div id="lane-insufficient" class="lead-list"></div>
        </div>
        <div class="lane" data-bucket="过期/低优先级">
          <h2>过期/低优先级</h2>
          <div id="lane-stale" class="lead-list"></div>
        </div>
      </section>
    </main>

    <script src="/leads/static/leads.js"></script>
  </body>
</html>
